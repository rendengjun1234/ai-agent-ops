<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fff; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #1a1a1a; }
    .status { padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.detected { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.none { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .platform-icon { font-size: 18px; margin-right: 6px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    .result { margin-top: 12px; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 12px; color: #475569; max-height: 150px; overflow-y: auto; }
    .result.success { background: #f0fdf4; color: #166534; }
    .result.error { background: #fef2f2; color: #991b1b; }
    .info { font-size: 12px; color: #94a3b8; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>🔗 多平台商家绑定</h2>
  <div id="statusBox" class="status none">检测中...</div>
  <button id="bindBtn" class="btn btn-primary" disabled>提取Cookie并绑定</button>
  <div id="result" class="result" style="display:none;"></div>
  <p class="info">请先登录对应平台的商家后台，然后点击绑定按钮。<br>支持：美团、饿了么、抖音来客、小红书、大众点评</p>
  <script src="popup.js"></script>
</body>
</html>
